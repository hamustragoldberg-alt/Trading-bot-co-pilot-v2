name: Update BTC data

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:         # allows you to run it manually

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas yfinance

      - name: Download BTC 1h data (last 5 days)
        run: |
          python -c "
          import yfinance as yf
          df = yf.download('BTC-USD', period='5d', interval='1h')
          df = df[['Open','High','Low','Close','Volume']]
          df.index.name = 'Date'
          df.to_csv('btc_data.csv')
          "

      - name: Commit and push if changed
        run: |
          git config user.name 'github-actions'
          git config user.email 'actions@github.com'
          git add btc_data.csv
          git diff --staged --quiet || (git commit -m 'Auto-update BTC data' && git push)
